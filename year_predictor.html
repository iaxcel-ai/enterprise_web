<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Year Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f8ff;
            color: #333;
            padding: 100px;
        }
        h1 {
            font-weight: bold;
            font-size: 36px;
            margin-bottom: 10px;
        }
        h2 {
            font-size: 20px;
            color:#666;
            margin-bottom: 30px;
        
        }
        #year-input {
            padding: 2px;
            font-size: 16px;
            width: 170px;
            text-align: left;
        }
        .btn {
            padding: 3px 16px;
            font-size: 16px;
            background-color: #26fa86;
            color: #333;
            border: 1px solid #ccc;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn:hover {
            background-color: #d1d1d1;
        }
        #loading-message {
            margin-top: 30px;
            font-size: 18px;
            color: #555;
        }
        #predicted-year {
            margin-top: 25px;
            font-size: 22px;
            font-weight: bold;
            color: #222;
        }
    </style>
</head>
<body>

    <h1>Year Predictor</h1>
    <h2>Enter the current year to predict next year</h2>

            <input type="number" id="year-input" placeholder="over here vro">
            <button class="btn" onclick="predictNextYear()">Predict Next Year</button>

        <div id="loading-message"></div>
        <div id="predicted-year"></div>

    <script>
        function predictNextYear() {
            const yearInput = document.getElementById('year-input').value;
            const loadingMessage = document.getElementById('loading-message');
            const predictedYear = document.getElementById('predicted-year');

            if (!yearInput) {
                alert('Please enter a valid year!');
                return;
            }

            // Clear any previous predictions
            predictedYear.innerHTML = '';
            loadingMessage.innerHTML = ''; 

            // Show loading messages
            setTimeout(() => {
                loadingMessage.innerHTML = 'Calculating next year with AI...';
            }, 500);

            setTimeout(() => {
                loadingMessage.innerHTML = 'Reading your ahh code...';
            }, 3000);

            setTimeout(() => {
                loadingMessage.innerHTML = 'Analyzing space-time vortexes...';
            }, 5000);

            // Simulate some loading time before prediction
            setTimeout(() => {
                const nextYear = parseInt(yearInput) + 1;
                predictedYear.innerHTML = `Predicted next year: ${nextYear}`;
                loadingMessage.innerHTML = '';
            }, 7000);
        }
    </script>

</body>
</html>
